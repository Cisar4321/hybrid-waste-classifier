<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificador de residuos</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e12; --panel:#121821; --panel2:#0e141b; --line:#212b36;
    --txt:#e8eef5; --muted:#7d8a99; --dim:#4a5663; --accent:#4ade80;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%, rgba(74,222,128,.06), transparent), var(--bg);
    color:var(--txt); min-height:100vh; line-height:1.5;
  }
  .mono{font-family:'IBM Plex Mono',monospace}
  .shell{max-width:1080px;margin:0 auto;padding:28px 24px 60px}

  header{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:28px;flex-wrap:wrap;gap:12px}
  .brand .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .brand h1{font-size:26px;font-weight:600;letter-spacing:-.01em}
  .brand h1 span{color:var(--muted);font-weight:400}
  .status{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:.3s}
  .dot.on{background:var(--accent);box-shadow:0 0 10px var(--accent)}

  .layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:780px){.layout{grid-template-columns:1fr}}

  .panel{background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .phead{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;border-bottom:1px solid var(--line)}
  .phead .t{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted)}
  .pbody{padding:18px}

  .stage{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;
    background:var(--panel2);border:1.5px dashed var(--line);display:flex;
    align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s}
  .stage.drag{border-color:var(--accent);background:rgba(74,222,128,.05)}
  .stage img,.stage video{width:100%;height:100%;object-fit:cover;display:none}
  .stage.has video,.stage.has img{display:block}
  .ph{text-align:center;padding:28px;color:var(--muted)}
  .ph svg{margin-bottom:14px;opacity:.5}
  .ph .big{font-size:15px;color:var(--txt);margin-bottom:4px}
  .ph .sm{font-size:12px;font-family:'IBM Plex Mono',monospace}
  .scan{position:absolute;inset:0;display:none;pointer-events:none}
  .stage.busy .scan{display:block}
  .scan::before{content:'';position:absolute;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sweep 1.1s ease-in-out infinite}
  @keyframes sweep{0%{top:4%}50%{top:96%}100%{top:4%}}

  .controls{display:flex;gap:10px;margin-top:14px}
  .btn{flex:1;padding:11px;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;
    letter-spacing:.04em;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  input[type=file]{display:none}

  .empty{height:100%;display:flex;flex-direction:column;align-items:center;
    justify-content:center;color:var(--dim);text-align:center;padding:40px;min-height:300px}
  .empty .mono{font-size:12px;letter-spacing:.06em}

  .verdict{position:relative;border-radius:14px;padding:22px;overflow:hidden;
    transition:background .5s ease;background:var(--panel2)}
  .verdict::after{content:'';position:absolute;inset:0;
    background:radial-gradient(120% 120% at 90% 10%,rgba(255,255,255,.14),transparent)}
  .verdict .lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;opacity:.85;position:relative}
  .verdict .bin{font-size:30px;font-weight:700;line-height:1.1;margin:6px 0 2px;letter-spacing:-.02em;position:relative}
  .verdict .cont{font-family:'IBM Plex Mono',monospace;font-size:13px;opacity:.85;position:relative}
  .verdict .cls{position:absolute;top:18px;right:20px;font-family:'IBM Plex Mono',monospace;
    font-size:12px;letter-spacing:.1em;text-transform:lowercase;opacity:.85}

  .meta{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center;margin-top:18px}
  .gauge{position:relative;width:96px;height:96px}
  .gauge .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .num{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .gauge .cap{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .tip{font-size:13px;color:var(--muted);border-left:2px solid var(--line);padding-left:12px}
  .tip b{color:var(--txt);font-weight:500}

  .bars{margin-top:20px}
  .bars .ht{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .row{display:grid;grid-template-columns:78px 1fr 46px;align-items:center;gap:10px;
    padding:4px 0;opacity:.55;transition:opacity .3s}
  .row.top{opacity:1}
  .row .name{font-family:'IBM Plex Mono',monospace;font-size:12px}
  .row .track{height:8px;background:#070a0d;border-radius:5px;overflow:hidden}
  .row .fill{height:100%;width:0;border-radius:5px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
  .row .pct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:right}

  footer{margin-top:26px;font-family:'IBM Plex Mono',monospace;font-size:11px;
    color:var(--dim);text-align:center;letter-spacing:.04em}
  .err{background:#2a1416;border:1px solid #5a2329;color:#ffb4b4;border-radius:10px;
    padding:12px 14px;font-size:13px;font-family:'IBM Plex Mono',monospace;margin-top:14px;display:none}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand">
      <div class="eyebrow">hybrid waste classifier</div>
      <h1>Tacho<span> / clasificador de residuos</span></h1>
    </div>
    <div class="status"><span class="dot" id="dot"></span><span id="statusTxt">cargando modelo</span></div>
  </header>

  <div class="layout">
    <section class="panel">
      <div class="phead"><span class="t">entrada</span><span class="t mono" id="srcTag">—</span></div>
      <div class="pbody">
        <label class="stage" id="stage">
          <input type="file" id="file" accept="image/jpeg,image/png">
          <div class="ph" id="ph">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M12 16V4m0 0L8 8m4-4l4 4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/>
            </svg>
            <div class="big">Suelta una imagen aqui</div>
            <div class="sm">jpg · png · o usa la camara</div>
          </div>
          <img id="preview" alt="">
          <video id="cam" playsinline muted></video>
          <div class="scan"></div>
        </label>
        <div class="controls">
          <button class="btn" id="camBtn" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            <span id="camLbl">Camara</span></button>
          <button class="btn" id="shotBtn" style="display:none">Capturar</button>
          <button class="btn" id="resetBtn" disabled>Limpiar</button>
        </div>
        <div class="err" id="err"></div>
      </div>
    </section>

    <section class="panel">
      <div class="phead"><span class="t">resultado</span><span class="t mono" id="engineTag">cnn</span></div>
      <div class="pbody" id="result">
        <div class="empty"><div class="mono">esperando imagen</div></div>
      </div>
    </section>
  </div>

  <footer>tensorflow.js · mobilenetv2 · inferencia local en el navegador</footer>
</div>

<canvas id="canvas" hidden></canvas>

<script>
const CLASES = ['battery','cardboard','glass','metal','organic','paper','plastic','textile','trash'];
const TACHOS = {
  battery:   ['Residuos peligrosos','Rojo','#c0392b','#ffffff','Pilas y baterias van a punto de acopio especial, nunca al tacho comun.'],
  cardboard: ['Papel y carton','Azul','#2563eb','#ffffff','Aplasta las cajas y mantenlas secas.'],
  paper:     ['Papel y carton','Azul','#2563eb','#ffffff','Sin restos de comida ni grasa.'],
  glass:     ['Vidrio','Verde','#16a34a','#ffffff','Enjuaga y retira tapas.'],
  metal:     ['Metales','Amarillo','#eab308','#1a1207','Enjuaga las latas antes de desechar.'],
  plastic:   ['Plasticos','Blanco','#cbd5e1','#0a0e12','Enjuaga botellas y envases.'],
  organic:   ['Organicos','Marron','#92400e','#ffffff','Restos de comida y poda.'],
  textile:   ['No aprovechables','Negro','#1f2933','#ffffff','Si esta en buen estado, considera donarlo.'],
  trash:     ['No aprovechables','Negro','#1f2933','#ffffff','Residuo general no reciclable.'],
};
const THETA = 0.60, IMG = 224;

const $ = s => document.querySelector(s);
const stage=$('#stage'), preview=$('#preview'), cam=$('#cam'), fileInput=$('#file'),
  camBtn=$('#camBtn'), camLbl=$('#camLbl'), shotBtn=$('#shotBtn'), resetBtn=$('#resetBtn'),
  dot=$('#dot'), statusTxt=$('#statusTxt'), result=$('#result'), errBox=$('#err'),
  srcTag=$('#srcTag'), engineTag=$('#engineTag'), canvas=$('#canvas');

let modelo=null, stream=null;

async function init(){
  try{
    modelo = await tf.loadLayersModel('modelo_tfjs/model.json');
    dot.classList.add('on'); statusTxt.textContent='modelo listo'; camBtn.disabled=false;
  }catch(e){
    statusTxt.textContent='sin modelo';
    showErr('No se cargo modelo_tfjs/model.json. Convierte cnn_verificador.h5 y sirve la carpeta por http.');
  }
}
function showErr(m){errBox.textContent=m;errBox.style.display='block'}
function hideErr(){errBox.style.display='none'}

fileInput.addEventListener('change', e=>{ if(e.target.files[0]) loadFile(e.target.files[0]); });
['dragover','dragenter'].forEach(ev=>stage.addEventListener(ev,e=>{e.preventDefault();stage.classList.add('drag')}));
['dragleave','drop'].forEach(ev=>stage.addEventListener(ev,e=>{e.preventDefault();stage.classList.remove('drag')}));
stage.addEventListener('drop',e=>{ const f=e.dataTransfer.files[0]; if(f) loadFile(f); });

function loadFile(file){
  stopCam(); hideErr();
  preview.src = URL.createObjectURL(file);
  preview.onload = ()=>{ stage.classList.add('has'); cam.style.display='none'; preview.style.display='block';
    srcTag.textContent='archivo'; resetBtn.disabled=false; clasificar(preview); };
}

camBtn.addEventListener('click', async ()=>{
  if(stream){ stopCam(); camLbl.textContent='Camara'; return; }
  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    cam.srcObject=stream; await cam.play();
    stage.classList.add('has'); preview.style.display='none'; cam.style.display='block';
    shotBtn.style.display='flex'; camLbl.textContent='Cerrar';
    srcTag.textContent='camara en vivo'; resetBtn.disabled=false;
  }catch(e){ showErr('No se pudo acceder a la camara.'); }
});
shotBtn.addEventListener('click', ()=>{
  canvas.width=cam.videoWidth; canvas.height=cam.videoHeight;
  canvas.getContext('2d').drawImage(cam,0,0);
  preview.src=canvas.toDataURL('image/jpeg');
  preview.onload=()=>{ stopCam(); camLbl.textContent='Camara'; cam.style.display='none';
    preview.style.display='block'; srcTag.textContent='captura'; clasificar(preview); };
});
function stopCam(){
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  shotBtn.style.display='none'; cam.style.display='none';
}
resetBtn.addEventListener('click', ()=>{
  stopCam(); camLbl.textContent='Camara'; stage.classList.remove('has');
  preview.src=''; preview.style.display='none'; srcTag.textContent='—'; resetBtn.disabled=true;
  result.innerHTML='<div class="empty"><div class="mono">esperando imagen</div></div>';
});

async function clasificar(imgEl){
  if(!modelo) return;
  stage.classList.add('busy');
  await new Promise(r=>setTimeout(r,60));
  const probs = tf.tidy(()=>{
    const t = tf.browser.fromPixels(imgEl).resizeBilinear([IMG,IMG]).toFloat().div(255).expandDims(0);
    return Array.from(modelo.predict(t).dataSync());
  });
  stage.classList.remove('busy');
  render(probs);
}

function render(probs){
  const ranked = CLASES.map((c,i)=>({c,p:probs[i]})).sort((a,b)=>b.p-a.p);
  const best = ranked[0], info = TACHOS[best.c], bin=info[0], cont=info[1], hex=info[2], fg=info[3], tip=info[4];
  engineTag.textContent = best.p>=THETA ? 'cnn · alta confianza' : 'cnn · revisar';

  const bars = ranked.map((o,i)=>{
    const fill = TACHOS[o.c][2];
    return `<div class="row ${i===0?'top':''}">
      <span class="name">${o.c}</span>
      <span class="track"><span class="fill" data-w="${(o.p*100).toFixed(1)}" style="background:${fill}"></span></span>
      <span class="pct">${(o.p*100).toFixed(1)}</span></div>`;
  }).join('');

  const pct = Math.round(best.p*100), C=2*Math.PI*42, off=C*(1-best.p);
  result.innerHTML = `
    <div class="verdict" style="background:${hex};color:${fg}">
      <div class="cls">${best.c}</div>
      <div class="lbl">Disposicion sugerida</div>
      <div class="bin">${bin}</div>
      <div class="cont">Contenedor · ${cont}</div>
    </div>
    <div class="meta">
      <div class="gauge">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="42" fill="none" stroke="#1b2430" stroke-width="7"/>
          <circle cx="48" cy="48" r="42" fill="none" stroke="${hex}" stroke-width="7"
            stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}"
            transform="rotate(-90 48 48)" id="ring"/>
        </svg>
        <div class="val"><span class="num" id="gnum">0%</span><span class="cap">confianza</span></div>
      </div>
      <div class="tip"><b>${cont}.</b> ${tip}</div>
    </div>
    <div class="bars"><div class="ht">distribucion · 9 clases</div>${bars}</div>`;

  requestAnimationFrame(()=>{
    document.querySelectorAll('.fill').forEach(f=>f.style.width=f.dataset.w+'%');
    const ring=$('#ring');
    if(ring){ ring.style.transition='stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)'; ring.style.strokeDashoffset=off.toFixed(1); }
    animNum(pct);
  });
}
function animNum(target){
  const el=$('#gnum'); let v=0;
  const step=()=>{ v+=Math.max(1,Math.round((target-v)/6)); if(v>=target)v=target;
    el.textContent=v+'%'; if(v<target) requestAnimationFrame(step); };
  step();
}

init();
</script>
</body>
</html>
